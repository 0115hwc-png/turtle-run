<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐢 Turtle Run — Golden Star</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JKTD8T6G79"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-JKTD8T6G79');

    function ga_starEarned(bookTitle, subject, totalStars) {
      gtag('event', 'star_earned', { event_category: 'progress', book_title: bookTitle, subject: subject, total_stars: totalStars });
    }
    function ga_goldenAwakened(bookTitle, subject, totalStars) {
      gtag('event', 'golden_turtle_awakened', { event_category: 'completion', book_title: bookTitle, subject: subject, total_stars: totalStars });
    }
    function ga_logAdded(bookTitle, amount, unit, newPct) {
      gtag('event', 'log_added', { event_category: 'engagement', book_title: bookTitle, amount: amount, unit: unit, progress_pct: newPct });
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g: #228B22; --gl: #e8f5e8; --gd: #1a6b1a;
      --gold: #f5c842; --goldf: #fffdf0;
      --bg: #fafaf7; --surface: #ffffff;
      --border: rgba(0,0,0,0.10);
      --text: #1a1a1a; --text2: #6b7280; --text3: #9ca3af;
      --radius-md: 8px; --radius-lg: 12px;
      --track-bg: #f0ead8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141414; --surface: #1e1e1e;
        --border: rgba(255,255,255,0.10);
        --text: #f0f0f0; --text2: #9ca3af; --text3: #6b7280;
        --track-bg: #2a2620; --gl: #1a2e1a; --goldf: #2a2510;
      }
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    .app { display: flex; height: 100vh; min-height: 600px; position: relative; }

    /* [사이드바 모바일 최적화 수정] */
    .sidebar { 
      width: 200px; min-width: 200px; background: var(--surface); border-right: 1px solid var(--border); 
      display: flex; flex-direction: column; padding: 16px 0; z-index: 1000;
      transition: transform 0.3s ease;
    }
    
    @media (max-width: 600px) {
      .sidebar {
        position: fixed;
        height: 100%;
        transform: translateX(-100%); /* 평소에는 숨김 */
      }
      .sidebar.mobile-open {
        transform: translateX(0); /* 클릭 시 등장 */
        box-shadow: 10px 0 30px rgba(0,0,0,0.15);
      }
      .menu-btn { display: flex !important; } /* 모바일에서만 햄버거 버튼 노출 */
      .overlay { display: block !important; }
    }

    /* 햄버거 버튼 스타일 */
    .menu-btn {
      display: none; position: fixed; top: 15px; left: 15px; width: 40px; height: 40px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 900;
    }

    /* 사이드바 열렸을 때 배경 어둡게 */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 950;
    }
    .sidebar-overlay.active { display: block; }

    .logo { display: flex; align-items: center; gap: 10px; padding: 0 16px 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .logo-bubble { width: 36px; height: 36px; background: var(--g); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .logo-text { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .logo-sub { font-size: 10px; color: var(--text2); }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; font-size: 13px; color: var(--text2); border-left: 3px solid transparent; transition: all 0.12s; user-select: none; }
    .nav-item:hover { background: var(--gl); color: var(--text); }
    .nav-item.active { background: var(--gl); color: var(--g); border-left-color: var(--g); font-weight: 600; }
    .nav-icon { font-size: 14px; width: 18px; text-align: center; }
    .sidebar-footer { padding: 12px 16px; font-size: 10px; color: var(--text3); margin-top: auto; line-height: 1.7; }

    .main { flex: 1; overflow-y: auto; padding: 20px; min-width: 0; background: var(--bg); }
    @media (max-width: 600px) { .main { padding-top: 70px; } }

    /* 이하 모든 기존 스타일 (400줄 분량의 디테일) 그대로 유지 */
    .page { display: none; }
    .page.active { display: block; }
    .sg { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 16px; }
    .sc { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 14px; }
    .sl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .sv { font-size: 22px; font-weight: 700; color: var(--text); }
    .ss { font-size: 10px; color: var(--text2); margin-top: 2px; }
    .sec { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 14px; }
    .sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .st { font-size: 14px; font-weight: 600; color: var(--text); }
    .btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-md); cursor: pointer; font-size: 12px; background: var(--surface); color: var(--text); transition: all 0.12s; font-family: inherit; }
    .btn:hover { background: var(--bg); }
    .btn-g { background: var(--g); color: #fff; border-color: var(--g); }
    .btn-g:hover { background: var(--gd); }
    .btn-xs { padding: 4px 8px; font-size: 11px; }
    .btn-danger { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
    .btn-danger:hover { background: #fecaca; }

    .track-item { margin-bottom: 18px; }
    .track-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .track-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .track-sub { font-size: 10px; color: var(--text2); margin-left: 6px; }
    .track-pct { font-size: 12px; color: var(--g); font-weight: 700; }
    .track-bar { position: relative; height: 28px; background: var(--track-bg); border-radius: 14px; overflow: visible; margin-bottom: 4px; }
    .track-fill { height: 100%; border-radius: 14px; transition: width 0.7s cubic-bezier(.34,1.56,.64,1); background: #a5d6a5; min-width: 0; }
    .track-fill.gold { background: var(--gold); }
    .turtle-wrap { position: absolute; top: 50%; transform: translateY(-50%); transition: left 0.7s cubic-bezier(.34,1.56,.64,1); }
    .turtle-inner { position: relative; transform: translateX(-50%); font-size: 22px; line-height: 1; cursor: pointer; }
    .turtle-tip { position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%); background: rgba(10,10,10,0.85); color: #fff; font-size: 11px; padding: 4px 8px; border-radius: 6px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 10; }
    .turtle-wrap:hover .turtle-tip { opacity: 1; }
    .track-marks { display: flex; justify-content: space-between; padding: 0 4px; }
    .track-mark { font-size: 9px; color: var(--text3); }
    .stars-row { display: flex; gap: 3px; align-items: center; margin-top: 5px; }
    .star-dot { font-size: 14px; line-height: 1; }
    .stars-label { font-size: 9px; color: var(--text3); margin-left: 4px; }

    .fi { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit; }
    .fi:focus { outline: none; border-color: var(--g); box-shadow: 0 0 0 2px rgba(34,139,34,0.15); }
    .fg { margin-bottom: 12px; }
    .fl { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: block; font-weight: 500; }
    .fr { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mf { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .input-feedback { font-size: 11px; color: var(--g); margin-top: 5px; min-height: 15px; font-weight: 500; }
    .input-feedback.warn { color: #b8860b; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; width: 320px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text); }

    .kanban { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .kcol { background: var(--bg); border-radius: var(--radius-md); padding: 12px; }
    .kct { font-size: 10px; font-weight: 700; margin-bottom: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .kcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px; margin-bottom: 8px; }
    .kcard.mastered { border-color: var(--gold); background: var(--goldf); }
    .kcard-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .mbar { height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .mfill { height: 100%; border-radius: 3px; transition: width 0.4s; background: var(--g); }
    .mfill.gold { background: var(--gold); }
    .kmeta { display: flex; justify-content: space-between; align-items: center; }
    .kpct { font-size: 11px; color: var(--g); font-weight: 600; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: var(--radius-md); font-size: 10px; font-weight: 600; }
    .badge-gold { background: #fef9c3; color: #92400e; }

    .log-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .log-item:last-child { border-bottom: none; }
    .lb { font-size: 13px; font-weight: 600; color: var(--text); }
    .ld { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .ldate { font-size: 11px; color: var(--text3); white-space: nowrap; }

    .scard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .sn { font-size: 13px; font-weight: 600; color: var(--text); }
    .sm { font-size: 11px; color: var(--text2); margin-top: 3px; }

    .empty { text-align: center; padding: 32px; color: var(--text2); font-size: 13px; line-height: 1.8; }

    /* 황금 거북이 축하쇼 스타일 */
    .golden-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 3000; }
    .golden-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
    .spark-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 1; width: 100%; height: 100%; }
    .golden-card { position: relative; background: var(--surface); border-radius: 20px; padding: 32px 40px; text-align: center; border: 2px solid var(--gold); min-width: 280px; z-index: 2; box-shadow: 0 0 60px rgba(245,200,66,0.25); }
    .golden-turtle { font-size: 60px; display: block; animation: gPulse 1s ease-in-out infinite alternate; }
    @keyframes gPulse { from { transform: scale(1) rotate(-4deg); } to { transform: scale(1.1) rotate(4deg); } }
    .golden-title { font-size: 20px; font-weight: 800; color: #92400e; margin: 12px 0 4px; }
    .golden-sub { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
    .golden-stars-display { font-size: 22px; letter-spacing: 3px; margin-bottom: 6px; min-height: 30px; }
    .golden-count { font-size: 12px; color: var(--text2); margin-bottom: 18px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-bubble">🐢</div>
      <div>
        <div class="logo-text">Turtle Run</div>
        <div class="logo-sub">⭐ Golden Star</div>
      </div>
    </div>
    <div class="nav-item active" onclick="nav('home'); toggleSidebar()" id="nav-home"><span class="nav-icon">🏠</span>홈</div>
    <div class="nav-item" onclick="nav('progress'); toggleSidebar()" id="nav-progress"><span class="nav-icon">📊</span>진도 기록</div>
    <div class="nav-item" onclick="nav('kanban'); toggleSidebar()" id="nav-kanban"><span class="nav-icon">🐢</span>회독 보드</div>
    <div class="nav-item" onclick="nav('settings'); toggleSidebar()" id="nav-settings"><span class="nav-icon">⚙️</span>교재 설정</div>
    <div class="sidebar-footer">자동저장 · LocalStorage<br>v2.0 Golden Star</div>
  </div>

  <div class="main">
    <div class="page active" id="page-home">
      <div class="sg">
        <div class="sc"><div class="sl">D-Day</div><div class="sv" id="dday-val">-</div><div class="ss" id="dday-date">시험일 미설정</div></div>
        <div class="sc"><div class="sl">전체 달성률</div><div class="sv" id="avg-pct">0%</div><div class="ss" id="book-count">교재 0권</div></div>
        <div class="sc"><div class="sl">누적 별 ⭐</div><div class="sv" id="total-stars">0</div><div class="ss">오늘 포함 전체</div></div>
      </div>
      <div class="sec">
        <div class="sh"><span class="st">🏁 거북이 경주 트랙</span><button class="btn btn-g btn-xs" onclick="openLogModal()">+ 오늘 기록</button></div>
        <div id="race-track"></div>
      </div>
    </div>

    <div class="page" id="page-progress">
      <div class="sec">
        <div class="sh"><span class="st">📊 진도 기록</span><button class="btn btn-g btn-xs" onclick="openLogModal()">+ 기록 추가</button></div>
        <div id="log-list"></div>
      </div>
    </div>

    <div class="page" id="page-kanban">
      <div class="sec">
        <div class="sh"><span class="st">🐢 회독 보드</span></div>
        <div class="kanban" id="kanban-board"></div>
      </div>
    </div>

    <div class="page" id="page-settings">
      <div class="sec">
        <div class="sh"><span class="st">⚙️ 교재 설정</span><button class="btn btn-g btn-xs" onclick="openBookModal()">+ 교재 등록</button></div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)">
          <label style="font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap">🗓 시험 D-Day</label>
          <input type="date" class="fi" id="exam-date-input" style="max-width:180px" oninput="saveExamDate()">
        </div>
        <div id="settings-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="modal-area"></div>

<script>
/* [기능 로직 - 100% 원본 유지] */
let S = { books: [], logs: [], examDate: null };

function load() {
  try { const s = localStorage.getItem('turtlerun_gs'); if (s) S = JSON.parse(s); } catch(e) {}
  if (S.examDate) document.getElementById('exam-date-input').value = S.examDate;
}
function save() { localStorage.setItem('turtlerun_gs', JSON.stringify(S)); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pct(b) { return b.total > 0 ? Math.min(100, Math.round(b.current / b.total * 100)) : 0; }

// 사이드바 토글 함수 (모바일 전용)
function toggleSidebar() {
  if (window.innerWidth > 600) return;
  document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('sidebar-overlay').classList.toggle('active');
}

function getStarsFor(bookId) {
  const byDay = {};
  S.logs.filter(l => l.bookId === bookId).forEach(l => { const d = l.date.slice(0,10); byDay[d] = (byDay[d]||0) + l.amount; });
  const b = S.books.find(b => b.id === bookId); if (!b) return {};
  const stars = {};
  Object.entries(byDay).forEach(([d, amt]) => { stars[d] = b.dailyGoal > 0 && amt >= b.dailyGoal; });
  return stars;
}

function getLast7Stars(bookId) {
  const stars = getStarsFor(bookId); const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0,10);
    const day = ['일','월','화','수','목','금','토'][d.getDay()];
    days.push({ key, day, earned: stars[key] === true, logged: key in stars });
  }
  return days;
}

function countAllStars() {
  let t = 0;
  S.books.forEach(b => { Object.values(getStarsFor(b.id)).forEach(v => { if (v) t++; }); });
  return t;
}

function nav(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  render();
}

function saveExamDate() { S.examDate = document.getElementById('exam-date-input').value; save(); renderHome(); }
function getDday() { if (!S.examDate) return null; return Math.ceil((new Date(S.examDate) - new Date()) / 86400000); }

function renderHome() {
  const dd = getDday();
  const dv = document.getElementById('dday-val'), dd2 = document.getElementById('dday-date');
  if (dd === null) { dv.textContent = '-'; dd2.textContent = '시험일 미설정'; }
  else if (dd > 0) { dv.textContent = 'D-' + dd; dd2.textContent = S.examDate; }
  else if (dd === 0) { dv.textContent = 'D-Day'; dd2.textContent = '오늘이 시험일!'; }
  else { dv.textContent = 'D+' + Math.abs(dd); dd2.textContent = S.examDate; }
  const avg = S.books.length ? Math.round(S.books.reduce((s,b) => s+pct(b), 0) / S.books.length) : 0;
  document.getElementById('avg-pct').textContent = avg + '%';
  document.getElementById('book-count').textContent = '교재 ' + S.books.length + '권';
  document.getElementById('total-stars').textContent = countAllStars();
  const track = document.getElementById('race-track');
  if (!S.books.length) {
    track.innerHTML = '<div class="empty">교재를 등록하면 거북이들이 달리기 시작합니다 🐢<br><br><button class="btn btn-g" onclick="openBookModal()" style="margin-top:8px">+ 첫 교재 등록</button></div>';
    return;
  }
  track.innerHTML = S.books.map(b => {
    const p = pct(b), lp = Math.max(2, Math.min(93, p));
    const mastered = b.mastered || p >= 100;
    const days = getLast7Stars(b.id);
    const starsHtml = days.map(d => `<span class="star-dot" title="${d.day}">${d.earned ? '⭐' : (d.logged ? '☆' : '·')}</span>`).join('');
    return `<div class="track-item">
      <div class="track-head"><span><span class="track-name">${esc(b.title)}</span><span class="track-sub">${esc(b.subject)}</span></span><span class="track-pct">${p}%</span></div>
      <div class="track-bar">
        <div class="track-fill${mastered?' gold':''}" style="width:${p}%"></div>
        <div class="turtle-wrap" style="left:${lp}%"><div class="turtle-inner">${mastered?'🐢✨':'🐢'}<div class="turtle-tip">${b.current} / ${b.total} ${b.unit}</div></div></div>
      </div>
      <div class="track-marks"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div>
      <div class="stars-row">${starsHtml}<span class="stars-label">최근 7일</span></div>
    </div>`;
  }).join('');
}

function renderProgress() {
  const list = document.getElementById('log-list');
  if (!S.logs.length) { list.innerHTML = '<div class="empty">아직 기록이 없습니다</div>'; return; }
  list.innerHTML = [...S.logs].reverse().map(l => {
    const b = S.books.find(b => b.id === l.bookId);
    const met = b && b.dailyGoal > 0 && l.amount >= b.dailyGoal;
    return `<div class="log-item"><div><div class="lb">${esc(b?b.title:'(삭제됨)')} ${met?'⭐':''}</div><div class="ld">+${l.amount}${b?b.unit:''} ${b&&b.dailyGoal?`(목표 ${b.dailyGoal}${b.unit})`:''}</div></div><div class="ldate">${new Date(l.date).toLocaleDateString('ko-KR')}</div></div>`;
  }).join('');
}

function renderKanban() {
  document.getElementById('kanban-board').innerHTML = ['1회독','2회독','완료'].map((ph, pi) =>
    `<div class="kcol"><div class="kct">${ph}</div>${S.books.filter(b=>b.phase===pi).map(b=>{
      const p=pct(b),m=b.mastered;
      return `<div class="kcard${m?' mastered':''}"><div class="kcard-title">${m?'🐢✨ ':''}${esc(b.title)}</div><div class="mbar"><div class="mfill${m?' gold':''}" style="width:${p}%"></div></div><div class="kmeta"><span class="kpct">${p}%</span>${m?'<span class="badge badge-gold">마스터</span>':pi<2?`<button class="btn btn-xs" onclick="advancePhase('${b.id}')">다음 →</button>`:`<button class="btn btn-xs btn-g" onclick="advancePhase('${b.id}')">완료!</button>`}</div></div>`;
    }).join('')||'<div style="font-size:11px;color:var(--text3);text-align:center;padding:12px">없음</div>'}</div>`
  ).join('');
}

function renderSettings() {
  const list = document.getElementById('settings-list');
  if (!S.books.length) { list.innerHTML = '<div class="empty">등록된 교재가 없습니다</div>'; return; }
  list.innerHTML = S.books.map(b =>
    `<div class="scard"><div style="flex:1;min-width:0"><div class="sn">${b.mastered?'🐢✨ ':''}${esc(b.title)}</div><div class="sm">${esc(b.subject)} · ${b.total}${b.unit} · 하루목표 ${b.dailyGoal||0}${b.unit} · ${pct(b)}%</div></div><button class="btn btn-xs btn-danger" onclick="deleteBook('${b.id}')">삭제</button></div>`
  ).join('');
}

function render() { renderHome(); renderProgress(); renderKanban(); renderSettings(); }

function advancePhase(id) {
  const b = S.books.find(b => b.id === id); if (!b) return;
  if (b.phase < 2) { b.phase++; b.current = 0; save(); render(); }
  else { b.mastered = true; save(); triggerGolden(b); }
}

function deleteBook(id) {
  if (!confirm('교재를 삭제할까요? 기록도 함께 삭제됩니다.')) return;
  S.books = S.books.filter(b => b.id !== id);
  S.logs = S.logs.filter(l => l.bookId !== id);
  save(); render();
}

function openBookModal() {
  const subs = [...new Set(S.books.map(b => b.subject))];
  showModal(`<div class="modal-title">📚 교재 등록</div>
    <div class="fg"><label class="fl">과목명</label><input class="fi" id="m-sub" placeholder="예: 민법, 행정법" list="sl" autocomplete="off"><datalist id="sl">${subs.map(s=>`<option value="${esc(s)}">`).join('')}</datalist></div>
    <div class="fg"><label class="fl">교재명</label><input class="fi" id="m-title" placeholder="예: 2025 민법 기본서"></div>
    <div class="fr"><div class="fg"><label class="fl">단위</label><select class="fi" id="m-unit"><option value="p">페이지</option><option value="문제">문제수</option><option value="강">강의수</option></select></div>
    <div class="fg"><label class="fl">전체 분량</label><input class="fi" id="m-total" type="number" min="1" placeholder="500"></div></div>
    <div class="fg"><label class="fl">하루 권장 목표량 <span style="color:var(--text3)">(0 = 미설정)</span></label><input class="fi" id="m-goal" type="number" min="0" placeholder="예: 30"></div>
    <div class="mf"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-g" onclick="addBook()">등록하기</button></div>`);
}

function addBook() {
  const subject=document.getElementById('m-sub').value.trim(),title=document.getElementById('m-title').value.trim(),unit=document.getElementById('m-unit').value,total=parseInt(document.getElementById('m-total').value)||0,dailyGoal=parseInt(document.getElementById('m-goal').value)||0;
  if(!subject||!title||total<1){alert('과목명, 교재명, 전체 분량을 입력해주세요');return;}
  S.books.push({id:Date.now().toString(),subject,title,unit,total,dailyGoal,current:0,phase:0,mastered:false});
  save();closeModal();render();
}

function openLogModal() {
  if(!S.books.length){alert('먼저 교재를 등록해주세요');openBookModal();return;}
  showModal(`<div class="modal-title">✏️ 오늘 기록</div>
    <div class="fg"><label class="fl">교재 선택</label><select class="fi" id="m-book" onchange="updateLogInfo()">${S.books.map(b=>`<option value="${b.id}">${esc(b.subject)} — ${esc(b.title)}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl" id="m-amt-label">오늘 완료한 분량</label><input class="fi" id="m-amt" type="number" min="1" placeholder="숫자 입력" oninput="updateLogPreview()"></div>
    <div id="log-info" style="font-size:11px;color:var(--text2);margin-bottom:4px;min-height:14px"></div>
    <div id="log-fb" class="input-feedback"></div>
    <div class="mf"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-g" onclick="addLog()">저장 ⭐</button></div>`);
  updateLogInfo();
}

function updateLogInfo() {
  const b=S.books.find(b=>b.id===document.getElementById('m-book').value);if(!b)return;
  document.getElementById('m-amt-label').textContent=`오늘 완료한 분량 (${b.unit})`;
  document.getElementById('log-info').textContent=`현재 ${b.current}${b.unit} · 남은 ${Math.max(0,b.total-b.current)}${b.unit}${b.dailyGoal?` · 오늘 목표 ${b.dailyGoal}${b.unit}`:''}`;
  updateLogPreview();
}

function updateLogPreview() {
  const b=S.books.find(b=>b.id===document.getElementById('m-book').value);
  const amt=parseInt(document.getElementById('m-amt').value)||0;const fb=document.getElementById('log-fb');
  if(!b||amt<=0){fb.textContent='';return;}
  const np=Math.min(100,Math.round((b.current+amt)/b.total*100));
  if(b.dailyGoal>0&&amt>=b.dailyGoal){fb.className='input-feedback';fb.textContent=`⭐ 목표 달성! ${np}% 도달 예정`;}
  else if(b.dailyGoal>0){fb.className='input-feedback warn';fb.textContent=`☆ 목표까지 ${b.dailyGoal-amt}${b.unit} 더 필요 · ${np}% 예정`;}
  else{fb.className='input-feedback';fb.textContent=`+${amt}${b.unit} → ${np}% 예정`;}
}

function addLog() {
  const b=S.books.find(b=>b.id===document.getElementById('m-book').value);
  const amt=parseInt(document.getElementById('m-amt').value)||0;
  if(!b||amt<=0){alert('올바른 분량을 입력해주세요');return;}
  const prevPct=pct(b);
  S.logs.push({id:Date.now().toString(),bookId:b.id,amount:amt,date:new Date().toISOString()});
  b.current=Math.min(b.total,b.current+amt);
  save();closeModal();
  const newPct=pct(b);

  /* GA4 이벤트 전송 */
  if(typeof ga_logAdded==='function') ga_logAdded(b.title,amt,b.unit,newPct);
  if(b.dailyGoal>0){
    const todayAmt=S.logs.filter(l=>l.bookId===b.id&&l.date.slice(0,10)===new Date().toISOString().slice(0,10)).reduce((s,l)=>s+l.amount,0);
    if((todayAmt-amt)<b.dailyGoal&&todayAmt>=b.dailyGoal){
      if(typeof ga_starEarned==='function') ga_starEarned(b.title,b.subject,countAllStars());
    }
  }

  if(prevPct<100&&newPct>=100&&!b.mastered){b.mastered=true;save();setTimeout(()=>triggerGolden(b),100);}
  else render();
}

function showModal(html) {
  closeModal();
  const area=document.getElementById('modal-area');
  const bd=document.createElement('div');bd.className='modal-backdrop';
  bd.innerHTML=`<div class="modal">${html}</div>`;
  bd.addEventListener('click',e=>{if(e.target===bd)closeModal();});
  area.appendChild(bd);
}

function closeModal(){document.getElementById('modal-area').innerHTML='';}

function triggerGolden(book) {
  render();
  const totalStars=countAllStars();
  if(typeof ga_goldenAwakened==='function') ga_goldenAwakened(book.title,book.subject,totalStars);

  const overlay=document.createElement('div');overlay.className='golden-overlay';
  overlay.innerHTML=`<div class="golden-bg"></div><canvas id="fw-canvas" class="spark-canvas"></canvas>
    <div class="golden-card">
      <span class="golden-turtle">🐢✨</span>
      <div class="golden-title">Mission Complete!</div>
      <div class="golden-sub">"${esc(book.title)}" 완독 달성!</div>
      <div class="golden-stars-display" id="stars-reveal"></div>
      <div class="golden-count">총 <strong>${totalStars}</strong>개의 별을 모았습니다</div>
      <button class="btn btn-g" style="font-size:13px;padding:8px 20px" onclick="this.closest('.golden-overlay').remove()">계속 달리기 🐢</button>
    </div>`;
  document.body.appendChild(overlay);

  const canvas=document.getElementById('fw-canvas');const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const W=canvas.width,H=canvas.height;
  const particles=[];const syms=['⭐','✨','🌟','💛','⭐','⭐','✨','🌟'];
  function burst(cx,cy,count){for(let i=0;i<count;i++){const angle=Math.random()*Math.PI*2,speed=2.5+Math.random()*5.5;particles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2.5,life:1,sym:syms[Math.floor(Math.random()*syms.length)],size:16+Math.random()*12});}}
  const origins=[[W*.2,H*.25],[W*.8,H*.2],[W*.5,H*.15],[W*.1,H*.5],[W*.9,H*.4],[W*.65,H*.3],[W*.35,H*.6],[W*.75,H*.55]];
  let frame=0,burstIdx=0;
  function animate(){ctx.clearRect(0,0,W,H);
    if(frame%16===0&&burstIdx<origins.length){burst(origins[burstIdx][0],origins[burstIdx][1],20);burstIdx++;}
    if(frame%28===0&&frame<280)burst(Math.random()*W,Math.random()*H*.65,14);
    for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.13;p.life-=0.016;if(p.life<=0){particles.splice(i,1);continue;}ctx.globalAlpha=p.life;ctx.font=`${Math.round(p.size)}px serif`;ctx.fillText(p.sym,p.x,p.y);}
    ctx.globalAlpha=1;frame++;if(frame<400||particles.length>0)requestAnimationFrame(animate);}
  requestAnimationFrame(animate);

  const revealEl=document.getElementById('stars-reveal');let shown=0;const cap=Math.min(totalStars,10);
  const iv=setInterval(()=>{if(shown<cap){shown++;revealEl.textContent='⭐'.repeat(shown)+(totalStars>10?'…':'');}else clearInterval(iv);},110);
}

load();
render();
</script>
</body>
</html>
